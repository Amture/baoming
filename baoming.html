<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>蓝天杯报名表 · 在线填写并生成正式Word文档</title>
    <style>
        /* 页面显示样式 */
        * {
            box-sizing: border-box;
        }
        body {
            background: #eef2f7;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 750px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 24px 20px 32px;
            margin-bottom: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        h2 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 0.25rem;
            color: #1e2a3e;
            border-left: 5px solid #0a66c2;
            padding-left: 16px;
        }
        .sub {
            color: #4a627a;
            font-size: 0.85rem;
            margin-bottom: 24px;
            border-left: 5px solid #0a66c2;
            padding-left: 16px;
        }
        .form-row {
            margin-bottom: 18px;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 8px;
        }
        .form-row label {
            width: 110px;
            font-weight: 600;
            color: #1e4663;
            padding-top: 10px;
            font-size: 0.95rem;
        }
        .form-row input {
            flex: 1;
            min-width: 180px;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            font-size: 0.95rem;
            background: #fff;
            transition: 0.2s;
        }
        .form-row input:focus {
            outline: none;
            border-color: #0a66c2;
            box-shadow: 0 0 0 3px rgba(10,102,194,0.2);
        }
        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin: 32px 0 16px;
        }
        button {
            background: #0a66c2;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            max-width: 220px;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.97);
            background: #084a8f;
        }
        .info-note {
            background: #f0f4f9;
            border-radius: 20px;
            padding: 14px 18px;
            font-size: 0.85rem;
            color: #2c3e50;
            text-align: center;
            margin-top: 20px;
        }
        @media (max-width: 550px) {
            .form-row {
                flex-direction: column;
            }
            .form-row label {
                width: auto;
                padding-top: 0;
            }
            button {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>第五届“青岛海尔蓝天杯”职业技能大赛</h2>
        <div class="sub">请务必前往默认浏览器打开该网页</div>

        <div class="form-row">
            <label>姓名</label>
            <input type="text" id="name" placeholder="请输入姓名" autocomplete="off">
        </div>
        <div class="form-row">
            <label>性别</label>
            <input type="text" id="gender" placeholder="男/女">
        </div>
        <div class="form-row">
            <label>所属系部及班级</label>
            <input type="text" id="deptClass" placeholder="例：信息工程系 计算机应用2301班">
        </div>
        <div class="form-row">
            <label>参赛项目</label>
            <input type="text" id="event" placeholder="填写具体赛项名称">
        </div>
        <div class="form-row">
            <label>联系电话</label>
            <input type="tel" id="phone" placeholder="手机号">
        </div>
        <div class="form-row">
            <label>指导教师(选填)</label>
            <input type="text" id="teacher" placeholder="指导教师姓名">
        </div>
        <div class="form-row">
            <label>指导教师电话(选填)</label>
            <input type="tel" id="teacherPhone" placeholder="指导教师联系方式">
        </div>

        <div class="btn-group">
            <button id="downloadBtn">📄 生成正式报名表 (.doc)</button>
        </div>
        <div class="info-note">
            ✅ 请务必前往默认浏览器打开该网页<br>
            💡 下载后请在微信聊天窗口点击「文件」→ 选择该文件发送给负责人。
        </div>
    </div>
</div>

<script>
    document.getElementById('downloadBtn').addEventListener('click', function() {
        const name = document.getElementById('name').value.trim() || '______';
        const gender = document.getElementById('gender').value.trim() || '______';
        const deptClass = document.getElementById('deptClass').value.trim() || '______';
        const eventName = document.getElementById('event').value.trim() || '______';
        const phone = document.getElementById('phone').value.trim() || '______';
        const teacher = document.getElementById('teacher').value.trim() || '______';
        const teacherPhone = document.getElementById('teacherPhone').value.trim() || '______';
        const currentDate = new Date().toLocaleDateString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit' });

        const docHtml = `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>蓝天杯报名表_${name}</title>
    <style>
        @page {
            size: A4;
            margin: 2.54cm 3.17cm;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: '宋体', SimSun, 'Times New Roman', serif;
            font-size: 12pt;
            line-height: 1.4;
            background: white;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 18pt;
            font-weight: bold;
            margin: 0 0 4pt 0;
        }
        .subtitle {
            text-align: center;
            font-size: 14pt;
            font-weight: bold;
            margin: 0 0 20pt 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20pt;
            font-size: 12pt;
        }
        th, td {
            border: 1px solid #000000;
            padding: 8pt 6pt;
            vertical-align: top;
        }
        th {
            font-weight: bold;
            background-color: #f9f9f9;
            text-align: center;
            width: 20%;
        }
        .sign-line {
            margin-top: 20pt;
            font-size: 12pt;
        }
        .date {
            float: right;
        }
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>第五届“青岛海尔蓝天杯”职业技能大赛</h1>
    <div class="subtitle">报名表</div>

    <table>
        <tr><th>姓名</th><td>${escapeHtml(name)}</td><th>性别</th><td>${escapeHtml(gender)}</td></tr>
        <tr><th>所属系部及班级</th><td colspan="3">${escapeHtml(deptClass)}</td></tr>
        <tr><th>参赛项目</th><td colspan="3">${escapeHtml(eventName)}</td></tr>
        <tr><th>联系电话</th><td colspan="3">${escapeHtml(phone)}</td></tr>
        <tr><th>指导教师</th><td>${escapeHtml(teacher)}</td><th>联系电话</th><td>${escapeHtml(teacherPhone)}</td></tr>
        <tr><th>赛项负责人意见</th><td colspan="3">________________________<br><span style="float: right;">年 月 日</span></td></tr>
        <tr><th>系部意见</th><td colspan="3">________________________<br><span style="float: right;">年 月 日</span></td></tr>
        <tr><th>组委会意见</th><td colspan="3">________________________<br><span style="float: right;">年 月 日</span></td></tr>
    </table>

    <div class="sign-line clearfix">
        <span>填表人：${escapeHtml(name)}</span>
        <span class="date">填表日期：${currentDate}</span>
    </div>
</div>
</body>
</html>`;
        const blob = new Blob([docHtml], { type: 'application/msword' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = `蓝天杯报名表_${name}.doc`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    });

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
</body>
</html>
